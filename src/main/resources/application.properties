# ================================
# Configuration MySQL
# ================================
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:tracabilite_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ================================
# Server
# ================================
server.port=${SERVER_PORT:8080}

# ================================
# Initialisation des données (gérée par DataInitializer.java)
# ================================
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never